services:
  postgres:
    image: postgres:16-alpine
    container_name: ga4-dashboard-postgres-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ga4_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ga4-dashboard-redis-local
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ga4-analytics-dashboard:dev
    pull_policy: never
    container_name: ga4-dashboard-app-local
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ga4_dashboard?schema=public
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - ./service-account-key.json:/app/service-account-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ga4-analytics-dashboard:dev
    pull_policy: never
    container_name: ga4-dashboard-scheduler-local
    command: ["npx", "tsx", "workers/ab-test-scheduler.ts"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ga4_dashboard?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://app:3000
    env_file:
      - .env
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - ./service-account-key.json:/app/service-account-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  postgres_data:
  app_node_modules:
